spring:
  application:
    name: ecommerce-hub-api

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ecommerce_hub}
    username: ${DB_USERNAME:ecommerce_hub}
    password: ${DB_PASSWORD:changeme}

  jpa:
    hibernate:
      # Flyway owns the schema. Never let Hibernate generate or alter it —
      # "validate" just checks the entities match what Flyway already created.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

# Step 3: Argon parameters — never hardcoded, always from the environment.
security:
  argon2:
    salt-length: 16
    hash-length: 32
    parallelism: ${ARGON2_PARALLELISM:1}
    memory-kb: ${ARGON2_MEMORY_KB:19456}
    iterations: ${ARGON2_ITERATIONS:2}
  jwt:
    secret: ${JWT_SECRET:}
    access-token-ttl-minutes: 15
    refresh-token-ttl-days: 7

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    com.raul.ecommercehub: ${APP_LOG_LEVEL:INFO}
